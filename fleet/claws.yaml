azure:
  location: westus
  resource_group_name: rg-claw-westus
  virtual_network_name: rg-claw-westus-vnet
  subnet_name: default
  network_security_group_name: rg-claw-westus-nsg
  address_space:
    - 10.0.0.0/16
  subnet_prefixes:
    - 10.0.0.0/24
  # Gallery names are subscription-unique; the original clawGallery lives in eastus.
  gallery_name: clawGalleryWest
  # Single image definition: option (b) collapses the desktop layer into the
  # claw-os bake on top of the AMD marketplace base. The standalone baseline/
  # Terraform covers the "deploy a generic GPU desktop" case directly from the
  # marketplace image without an intermediate baked baseline.
  fleet_image_definition_name: claw-os
  image_definitions:
    claw-os:
      publisher: claw
      offer: claw-vm
      sku: os
      # Must match the AMD V710 marketplace base used by the Packer bake.
      purchase_plan:
        name: planid125
        publisher: amdinc1746636494855
        product: nvv5_v710_linux_rocm_image
  hyper_v_generation: V2
  # AMD V710 marketplace base image does not support Trusted Launch.
  trusted_launch_enabled: false
  tags:
    managed-by: terraform
    project: openclawps

defaults:
  admin_username: azureuser
  vm_size: Standard_NV8ads_V710_v5
  data_disk_size_gb: 32
  data_disk_sku: Standard_LRS
  image_version: "1.0.0"
  model: xai/grok-4.20-0309-reasoning
  telegram_user_id: ""
  # AMD V710 marketplace image doesn't support Trusted Launch.
  enable_trusted_launch: false

claws:
  chad-claw: {}
